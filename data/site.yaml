# Page content for zegami.com. Edit copy here — layouts read from this file.
# Sections correspond 1:1 with the draft in docs/content.md.

hero:
  headline: "See your data. All of it."
  subheadline: >-
    Zegami is a visual data exploration platform that lets you interactively
    browse, filter, and compare thousands of data points: images, documents,
    time series, geospatial, all in a single view.
  tagline: "Not a dashboard. Not a database."
  primaryCta:
    label: "Explore examples"
    url: "https://app.zegami.com"
  secondaryCta:
    label: "Get in touch"
    url: "#contact"
  # Screenshot paths point at static/<src>. The template uses fileExists —
  # if the file isn't there, the dashed placeholder renders instead.
  screenshot:
    src: "images/hero.png"
    alt: "Zegami collection view showing a grid of image tiles with a filter panel"

problem:
  heading: "Your data is bigger than your tools"
  body: |
    Spreadsheets flatten everything into rows. Dashboards show you summaries.
    Neither lets you actually look at your data.

    Zegami gives you the full picture, literally. Lay out thousands of images,
    data points, or documents visually. Filter, sort, group, and zoom in on
    what matters. Spot patterns that no chart would show you.

capabilities:
  heading: "One platform. Every data type."
  items:
    - title: "Visual exploration"
      body: >-
        Browse thousands of items as a visual grid. Sort, filter, and group by
        any field. Zoom from overview to individual record in a click.
      screenshot:
        src: "images/capabilities/visual-exploration.png"
        alt: "Grid view with colour-coded grouping"
    - title: "Image collections"
      body: >-
        Purpose-built for datasets where images matter: camera traps,
        microscopy, aerial surveys, historical archives. See images alongside
        metadata, not buried in folders.
      screenshot:
        src: "images/capabilities/image-collections.gif"
        alt: "Image collection with metadata panel open"
    - title: "Geospatial"
      body: >-
        Plot your data on a map. Filter spatially. Understand how location
        relates to everything else in your dataset.
      screenshot:
        src: "images/capabilities/geospatial.png"
        alt: "Zegami map view plotting the National Herbarium of Victoria collection as clustered points across Australia and New Zealand"
    - title: "Time series & charts"
      body: >-
        Layer in temporal data. Compare trends across groups. Link chart
        selections back to individual records.
      screenshot:
        src: "images/capabilities/time-series.jpg"
        alt: "Chart and time series view"
    - title: "Filtering & faceting"
      body: >-
        Combine filters across any dimension numeric ranges, categories,
        text search, date ranges. Every filter updates every view in real time.
      screenshot:
        src: "images/capabilities/filtering.jpg"
        alt: "Filter panel with multiple active filters"

useCases:
  heading: "Proven across sectors"
  # `icon` refers to a file in layouts/partials/icons/<icon>.svg.
  # Lucide icons: https://lucide.dev/icons
  items:
    - title: "Life sciences"
      icon: "microscope"
      body: >-
        High-throughput imaging, phenotyping, pathology, microscopy. Researchers
        use Zegami to visually QA and explore imaging datasets that are too
        large to review manually.
    - title: "Environmental monitoring"
      icon: "tree-pine"
      body: >-
        Camera trap review, biodiversity surveys, habitat assessment. Explore
        species detections across sites, time periods, and sensor types in a
        single view.
    - title: "Digital humanities"
      icon: "book-open"
      body: >-
        Museum collections, historical archives, manuscript analysis. Scholars
        use Zegami to explore and annotate large visual collections without
        specialist software.
    - title: "Industrial & enterprise"
      icon: "factory"
      body: >-
        Quality control imaging, asset inspection, document review. Any
        workflow where people need to visually assess large volumes of data.

howItWorks:
  heading: "From data to insight in minutes"
  steps:
    - title: "Connect your data"
      body: >-
        Upload a spreadsheet, connect to an API, or point Zegami at an image
        folder. Structured and unstructured data, together.
    - title: "Explore visually"
      body: >-
        Every record becomes a tile. Filter, sort, and group across any
        combination of fields. Switch between grid, map, chart, and detail
        views.
    - title: "Share and collaborate"
      body: >-
        Publish collections for your team or publicly. Save views. Export
        filtered subsets. No training required.

differentiator:
  heading: "Built for real-world data at scale"
  body: |
    Born from research at the University of Oxford and developed over ten
    years, Zegami is used in production by research institutions, government
    agencies, and commercial organisations worldwide.
  # TODO: swap the generic line above for a concrete fact when comfortable,
  # e.g. "Deployed across collections containing over 5 million records" or
  # "Used by the University of Oxford, the National Herbarium of Victoria,
  # and the Australian Plant Phenomics Facility." One line of specificity
  # beats three paragraphs of positioning.

contact:
  heading: "Get in touch"
  body: >-
    Whether you're exploring a new use case or ready to deploy, we'd like to
    hear from you.
  primaryCta:
    label: "roger@nobledynamic.com"
    url: "mailto:roger@nobledynamic.com"
  # Leave `url` empty to hide the secondary CTA — set to a Calendly or
  # similar booking link when one exists.
  secondaryCta:
    label: "Book a call"
    url: ""
  credit: >-
    Zegami is developed and licensed by
    <a href="https://videntai.com">Videntai</a>. Implementation and project
    work by <a href="https://nobledynamic.com">Noble Dynamic</a>.

footer:
  # Credit field intentionally omitted — the template falls through to the
  # copyright line on its own. Add a `credit` back here only if you want
  # something above the © line.
